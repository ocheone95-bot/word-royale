# Еженедельный триггер для Supabase Edge Function `weekly-prize-distribution`.
#
# Каждое воскресенье 23:55 UTC: раздать призы за прошлую календарную неделю
# (Mon … Sun) и разослать DM призёрам через Bot API. RPC award_weekly_prizes
# идемпотентно — повторный запуск ничего не сломает.
#
# Секреты (те же что у daily-reminder):
#   - CRON_SECRET
#   - SUPABASE_ANON_KEY
#
# Ручной триггер `workflow_dispatch` — для smoke-теста или экстренного перезапуска.

name: weekly-prize-distribution

on:
  schedule:
    # 23:55 UTC каждое воскресенье. Перед самым переходом на новую неделю,
    # чтобы топ был зафиксирован до того как кто-то начнёт играть в понедельник.
    - cron: '55 23 * * 0'
  workflow_dispatch:

concurrency:
  group: weekly-prize
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST weekly-prize-distribution
        env:
          SUPABASE_URL: https://mqwrezfmkcektzbtxzwt.supabase.co
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing CRON_SECRET or SUPABASE_ANON_KEY secret"
            exit 1
          fi
          response=$(mktemp)
          status=$(curl -sS -o "$response" -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${SUPABASE_URL}/functions/v1/weekly-prize-distribution")
          echo "HTTP ${status}"
          cat "$response"
          echo
          if [ "$status" != "200" ]; then
            exit 1
          fi
